<H3><A NAME="SECTION04034900000000000000">
Velocity{Vx,Vy}</A>
</H3>

<P>
Sets velocities <IMG
 WIDTH="20" HEIGHT="28" ALIGN="MIDDLE" BORDER="0"
 SRC="img367.png"
 ALT="$v_{x}$"> and <IMG
 WIDTH="20" HEIGHT="28" ALIGN="MIDDLE" BORDER="0"
 SRC="img368.png"
 ALT="$v_{y}$"> along the <IMG
 WIDTH="19" HEIGHT="14" ALIGN="BOTTOM" BORDER="0"
 SRC="img430.png"
 ALT="$X$"> and <IMG
 WIDTH="17" HEIGHT="14" ALIGN="BOTTOM" BORDER="0"
 SRC="img394.png"
 ALT="$Y$"> directions
(in m/s) for the given stage.

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: <IMG
 WIDTH="20" HEIGHT="28" ALIGN="MIDDLE" BORDER="0"
 SRC="img367.png"
 ALT="$v_{x}$">, <IMG
 WIDTH="20" HEIGHT="28" ALIGN="MIDDLE" BORDER="0"
 SRC="img368.png"
 ALT="$v_{y}$">
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: 0.0, 0.0
</DIV>

<P>
<I>Example</I>: <TT><FONT SIZE="-1">Velocity{Vx,Vy}
0.0e0 1.0e-9</FONT></TT>
<P>
