<H3><A NAME="SECTION04025900000000000000">
trajectory</A>
</H3>

<P>
Specifies the interval (in timesteps) between printing configuration
information to the <TT>name.TRJ</TT> file. 

<P>
<I>Options</I>: #

<P>
<I>Default</I>: 1

<P>
<I>Example</I>: <B>trajectory</B> 100
