<H3><A NAME="SECTION04032600000000000000">
SetPnt_Amplitude</A>
</H3>

<P>
The value for the oscillation amplitude (in m) for the AGC, <IMG
 WIDTH="23" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img257.png"
 ALT="$A_{0}$">.

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: <IMG
 WIDTH="23" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img257.png"
 ALT="$A_{0}$"> 
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: 31.25d-9 m
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Example</I>: <TT><FONT SIZE="-1">SetPnt_Amplitude
5.0e-9</FONT></TT>
</DIV>
