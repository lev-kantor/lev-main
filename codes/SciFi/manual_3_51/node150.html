<H3><A NAME="SECTION04033700000000000000">

</H3>

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: <IMG
 WIDTH="19" HEIGHT="14" ALIGN="BOTTOM" BORDER="0"
 SRC="img412.png"
 ALT="$H$">, <IMG
 WIDTH="16" HEIGHT="15" ALIGN="BOTTOM" BORDER="0"
 SRC="img266.png"
 ALT="$R$">
</DIV>

<P>
<DIV ALIGN="LEFT">

</DIV>
