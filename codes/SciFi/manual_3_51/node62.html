<H3><A NAME="SECTION040221900000000000000">
es_tol</A>
</H3>

<P>
Maximum energy change during 1-dimensional search in eV
(#) during steepest descent (<B>steep</B>) or conjugate gradient
(<B>conj</B>) methods. 

<P>
<I>Options</I>: #

<P>
<I>Default:</I> # = <B>0.05</B>

<P>
<I>Example</I>: <B>es_tol 0.1</B>
