<H3><A NAME="SECTION040271200000000000000">
buffer </A>
</H3>

<P>
This parameter controls the distance, in &#197;, from the
conductors at which the charges on atoms begin to decay (#). 

<P>
<I>Options:</I> #

<P>
<I>Default</I>: # = <B>1.8</B>

<P>
<I>Example</I>: <B>buffer 5.0</B>
