<H3><A NAME="SECTION040331200000000000000">
smooth{F/T,points}</A>
</H3>

<P>
Controls smoothing out the forces using a certain number of points,
<IMG
 WIDTH="24" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img443.png"
 ALT="$N_{s}$">.

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: F, <IMG
 WIDTH="24" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img443.png"
 ALT="$N_{s}$">&nbsp;&nbsp;&nbsp;or&nbsp;&nbsp;&nbsp;T, <IMG
 WIDTH="24" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img443.png"
 ALT="$N_{s}$">
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: T,2
</DIV>

<P>
<I>Example</I>: <TT><FONT SIZE="-1">smooth{F/T,points}
T 2</FONT></TT>
<P>
