<H3><A NAME="SECTION040221400000000000000">
max_opt</A>
</H3>

<P>
Maximum number of relaxation iterations (N) to be used within
the optimisation method chosen (see below). 

<P>
<I>Options</I>: N

<P>
<I>Default</I>: N = <B>100</B>

<P>
<I>Example</I>: <B>max_opt 15</B>
