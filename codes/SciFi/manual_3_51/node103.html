<H3><A NAME="SECTION04027200000000000000">
Z_plane</A>
</H3>

<P>
This specifies the position of the infinite conducting plane
on the z-axis in &#197;(#). It is only meaningful if the keyword <B>plane</B>
is also present.

<P>
<I>Options</I>: #

<P>
<I>Default</I>: # = <B>0.0</B>

<P>
<I>Example</I>: <B>Z_plane</B> <B>-15.0</B>

<P>
