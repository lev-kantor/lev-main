<H3><A NAME="SECTION04034600000000000000">
AGC{T/F,A0}</A>
</H3>

<P>
Switches ON/OFF the AGC; if ON, then the set point amplitude <IMG
 WIDTH="16" HEIGHT="14" ALIGN="BOTTOM" BORDER="0"
 SRC="img366.png"
 ALT="$A$">
is also provided (in m). 

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: F/T, <IMG
 WIDTH="16" HEIGHT="14" ALIGN="BOTTOM" BORDER="0"
 SRC="img366.png"
 ALT="$A$">
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: T, <IMG
 WIDTH="23" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img257.png"
 ALT="$A_{0}$">
</DIV>

<P>
<I>Example</I>: <TT><FONT SIZE="-1">AGC{T/F,A0} T 0.1e-9</FONT></TT>
<P>
