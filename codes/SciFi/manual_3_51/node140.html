<H3><A NAME="SECTION040322200000000000000">
t-steps_in_period</A>
</H3>

<P>
Number of timesteps per oscillation period, <IMG
 WIDTH="36" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img407.png"
 ALT="$N_{osc}$">; is used to
calculate the timesteps itslef using <!-- MATH
 $\Delta t=1/(f_{0}N_{osc})$
 -->
<IMG
 WIDTH="119" HEIGHT="31" ALIGN="MIDDLE" BORDER="0"
 SRC="img408.png"
 ALT="$\Delta t=1/(f_{0}N_{osc})$">.

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: <IMG
 WIDTH="36" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img407.png"
 ALT="$N_{osc}$">
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: 400
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Example</I>: <TT><FONT SIZE="-1">t-steps_in_period
500</FONT></TT>
</DIV>
<P>
