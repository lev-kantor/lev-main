<H3><A NAME="SECTION04034500000000000000">
ADC{T/F,freq}</A>
</H3>

<P>
Switches ON/OFF the ADC; if ON, then the set point frequency shift
(negative) is also provided (in Hz). 

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: F/T, <IMG
 WIDTH="27" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img322.png"
 ALT="$\Delta f$">
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: T, <IMG
 WIDTH="32" HEIGHT="29" ALIGN="MIDDLE" BORDER="0"
 SRC="img396.png"
 ALT="$\Delta f_{0}$">
</DIV>

<P>
<I>Example</I>: <TT><FONT SIZE="-1">ADC{T/F,freq} T
-100.0</FONT></TT>
<P>
