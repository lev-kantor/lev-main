<H3><A NAME="SECTION04027700000000000000">
qwrite</A>
</H3>

<P>
This keyword controls whether the positions and charges
of all image charges are outputted to the file <I>charges.out</I>. 

<P>
<I>Options</I>: none

<P>
<I>Default</I>: off

<P>
<I>Example</I>: <B>qwrite</B>
