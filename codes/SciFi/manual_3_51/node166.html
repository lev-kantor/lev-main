<H3><A NAME="SECTION04034700000000000000">
Noise{F,A}</A>
</H3>

<P>
Switches ON/OFF the noise for the force and the amplitude (in this
order).

<P>
<DIV ALIGN="LEFT">
<I>Parameters</I>: F/T, F/T
</DIV>

<P>
<DIV ALIGN="LEFT">
<I>Default</I>: as in <TT>&lt;VirtualAFM&gt;</TT> box
</DIV>

<P>
<I>Example</I>: <TT><FONT SIZE="-1">Noise{F,A} T T</FONT></TT>
<P>
