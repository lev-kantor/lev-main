<H3><A NAME="SECTION04027500000000000000">
radius</A>
</H3>

<P>
This specifies the radius of the conducting sphere in &#197;
(#). This is only meaningful is the keyword <B>sphere</B> is also
present.

<P>
<I>Options</I>: #

<P>
<I>Default</I>: # = <B>100.0</B>

<P>
<I>Example</I>: <B>radius 50.0</B>

<P>
